<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Knowledge Module Prototype - Greater Exodus</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-0: #06070b;
      --bg-1: #0d111b;
      --panel: rgba(14, 18, 28, 0.9);
      --panel-2: rgba(22, 29, 43, 0.82);
      --line: rgba(255, 255, 255, 0.10);
      --text: #eef3ff;
      --muted: #a8b2c7;
      --gold: #f3c878;
      --accent: #7cc7ff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-0);
      color: var(--text);
    }
    body {
      margin: 0;
      padding: 10px;
      background:
        radial-gradient(circle at top, rgba(243, 200, 120, 0.10), transparent 28%),
        linear-gradient(180deg, var(--bg-1), var(--bg-0));
    }
    main {
      width: min(1180px, 100%);
      max-width: 1180px;
      margin: 0 auto;
      min-width: 0;
    }
    header {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 14px;
      background: var(--panel);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
    }
    h1, h2, h3 {
      margin: 0;
      line-height: 1.2;
    }
    h1 {
      font-size: clamp(1.75rem, 5vw, 2.6rem);
      color: var(--text);
    }
    h2 {
      margin-top: 24px;
      margin-bottom: 10px;
      font-size: 1.05rem;
      color: var(--accent);
    }
    h3 {
      font-size: 0.95rem;
      color: var(--gold);
    }
    p {
      color: var(--muted);
      line-height: 1.6;
    }
    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .pill {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--muted);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.8rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }
    .section {
      min-width: 0;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 20px;
      padding: 16px;
    }
    .item {
      border-top: 1px solid rgba(148, 163, 184, 0.16);
      padding-top: 10px;
      margin-top: 10px;
    }
    .item:first-child {
      border-top: 0;
      padding-top: 0;
      margin-top: 0;
    }
    .label {
      font-weight: 700;
      color: var(--text);
    }
    .sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .confidence {
      display: inline-block;
      margin-top: 6px;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 0.75rem;
      border: 1px solid rgba(124, 199, 255, 0.35);
      color: var(--accent);
      background: rgba(124, 199, 255, 0.10);
    }
    .error {
      border-color: rgba(248, 113, 113, 0.45);
      color: #fecaca;
    }
    ul {
      padding-left: 20px;
      color: var(--muted);
    }
    code {
      color: var(--gold);
    }
    .grid { margin-top: 12px; }
    .section > h2:first-child { margin-top: 0; }
    .section, .item { overflow-wrap: anywhere; }
    @media (max-width: 520px) {
      body { padding: 7px; }
      header, .section { border-radius: 16px; padding: 14px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1 id="title">Knowledge Module Prototype</h1>
      <p id="summary">Loading <code>data/modules/greater-exodus.json</code>...</p>
      <div id="meta" class="meta"></div>
    </header>
    <div id="root"></div>
  </main>

  <script>
    const modulePath = "data/modules/greater-exodus.json";
    const groups = [
      ["scriptures", "Scriptures"],
      ["relatedThemes", "Related Themes"],
      ["sacredTime", "Sacred Time"],
      ["timelineEvents", "Timeline Events"],
      ["revelationChapters", "Revelation Chapters"],
      ["commandments", "Commandments"],
      ["intertext", "Intertext"],
      ["sources", "Sources"],
      ["maps", "Maps"],
      ["orbitActions", "Orbit Actions"]
    ];

    function text(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      })[char]);
    }

    function itemTitle(item) {
      return item.title || item.label || item.reference || item.id || "Untitled";
    }

    function itemSubtitle(item) {
      const parts = [
        item.reference,
        item.relationshipType,
        item.from && item.to ? `${item.from} -> ${item.to}` : "",
        item.path
      ].filter(Boolean);
      return parts.join(" / ");
    }

    function renderGroup(key, label, items = []) {
      if (!items.length) return "";
      return `
        <section class="section">
          <h2>${text(label)}</h2>
          ${items.map(item => `
            <div class="item">
              <div class="label">${text(itemTitle(item))}</div>
              <div class="sub">${text(itemSubtitle(item))}</div>
              ${item.note ? `<div class="sub">${text(item.note)}</div>` : ""}
              ${item.confidence ? `<span class="confidence">${text(item.confidence)}</span>` : ""}
            </div>
          `).join("")}
        </section>
      `;
    }

    function renderModule(moduleData) {
      document.getElementById("title").textContent = moduleData.title || moduleData.id;
      document.getElementById("summary").textContent = moduleData.summary?.what || "";
      document.getElementById("meta").innerHTML = [
        moduleData.id,
        moduleData.moduleType,
        `schema ${moduleData.schemaVersion}`,
        moduleData.status
      ].filter(Boolean).map(value => `<span class="pill">${text(value)}</span>`).join("");

      const boundaryList = (moduleData.summary?.boundaries || [])
        .map(value => `<li>${text(value)}</li>`)
        .join("");
      const questionList = (moduleData.primaryQuestions || [])
        .map(value => `<li>${text(value)}</li>`)
        .join("");
      const relationshipHtml = groups
        .map(([key, label]) => renderGroup(key, label, moduleData.relationships?.[key] || []))
        .join("");
      const reviewHtml = renderGroup("reviewQueue", "Review Queue", moduleData.reviewQueue || []);

      document.getElementById("root").innerHTML = `
        <section class="section">
          <h2>Why It Matters</h2>
          <p>${text(moduleData.summary?.whyItMatters || "")}</p>
          <h2>Boundaries</h2>
          <ul>${boundaryList}</ul>
          <h2>Primary Questions</h2>
          <ul>${questionList}</ul>
        </section>
        <div class="grid">${relationshipHtml}${reviewHtml}</div>
      `;
    }

    fetch(modulePath)
      .then(response => {
        if (!response.ok) throw new Error(`Unable to load ${modulePath}`);
        return response.json();
      })
      .then(renderModule)
      .catch(error => {
        document.getElementById("summary").textContent = "This standalone prototype expects to be served from its folder so it can read the JSON module.";
        document.getElementById("root").innerHTML = `
          <section class="section error">
            <h2>Module Load Failed</h2>
            <p>${text(error.message)}</p>
            <p>Canonical data file: <code>${text(modulePath)}</code></p>
          </section>
        `;
      });
  </script>
</body>
</html>
