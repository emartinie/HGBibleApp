<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Knowledge Module Prototype - Greater Exodus</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }
    body {
      margin: 0;
      padding: 24px;
      background: #0f172a;
    }
    main {
      max-width: 1100px;
      margin: 0 auto;
    }
    header {
      border-bottom: 1px solid rgba(148, 163, 184, 0.25);
      padding-bottom: 16px;
      margin-bottom: 18px;
    }
    h1, h2, h3 {
      margin: 0;
      line-height: 1.2;
    }
    h1 {
      font-size: 2rem;
      color: #f8fafc;
    }
    h2 {
      margin-top: 24px;
      margin-bottom: 10px;
      font-size: 1.05rem;
      color: #bae6fd;
    }
    h3 {
      font-size: 0.95rem;
      color: #fde68a;
    }
    p {
      color: #cbd5e1;
      line-height: 1.6;
    }
    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .pill {
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: rgba(15, 23, 42, 0.75);
      color: #cbd5e1;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.8rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }
    .section {
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(30, 41, 59, 0.65);
      border-radius: 8px;
      padding: 14px;
    }
    .item {
      border-top: 1px solid rgba(148, 163, 184, 0.16);
      padding-top: 10px;
      margin-top: 10px;
    }
    .item:first-child {
      border-top: 0;
      padding-top: 0;
      margin-top: 0;
    }
    .label {
      font-weight: 700;
      color: #f8fafc;
    }
    .sub {
      margin-top: 4px;
      color: #94a3b8;
      font-size: 0.9rem;
    }
    .confidence {
      display: inline-block;
      margin-top: 6px;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 0.75rem;
      border: 1px solid rgba(125, 211, 252, 0.35);
      color: #bae6fd;
      background: rgba(14, 116, 144, 0.18);
    }
    .error {
      border-color: rgba(248, 113, 113, 0.45);
      color: #fecaca;
    }
    ul {
      padding-left: 20px;
      color: #cbd5e1;
    }
    code {
      color: #fde68a;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1 id="title">Knowledge Module Prototype</h1>
      <p id="summary">Loading <code>data/modules/greater-exodus.json</code>...</p>
      <div id="meta" class="meta"></div>
    </header>
    <div id="root"></div>
  </main>

  <script>
    const modulePath = "data/modules/greater-exodus.json";
    const groups = [
      ["scriptures", "Scriptures"],
      ["relatedThemes", "Related Themes"],
      ["sacredTime", "Sacred Time"],
      ["timelineEvents", "Timeline Events"],
      ["revelationChapters", "Revelation Chapters"],
      ["commandments", "Commandments"],
      ["intertext", "Intertext"],
      ["sources", "Sources"],
      ["maps", "Maps"],
      ["orbitActions", "Orbit Actions"]
    ];

    function text(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      })[char]);
    }

    function itemTitle(item) {
      return item.title || item.label || item.reference || item.id || "Untitled";
    }

    function itemSubtitle(item) {
      const parts = [
        item.reference,
        item.relationshipType,
        item.from && item.to ? `${item.from} -> ${item.to}` : "",
        item.path
      ].filter(Boolean);
      return parts.join(" / ");
    }

    function renderGroup(key, label, items = []) {
      if (!items.length) return "";
      return `
        <section class="section">
          <h2>${text(label)}</h2>
          ${items.map(item => `
            <div class="item">
              <div class="label">${text(itemTitle(item))}</div>
              <div class="sub">${text(itemSubtitle(item))}</div>
              ${item.note ? `<div class="sub">${text(item.note)}</div>` : ""}
              ${item.confidence ? `<span class="confidence">${text(item.confidence)}</span>` : ""}
            </div>
          `).join("")}
        </section>
      `;
    }

    function renderModule(moduleData) {
      document.getElementById("title").textContent = moduleData.title || moduleData.id;
      document.getElementById("summary").textContent = moduleData.summary?.what || "";
      document.getElementById("meta").innerHTML = [
        moduleData.id,
        moduleData.moduleType,
        `schema ${moduleData.schemaVersion}`,
        moduleData.status
      ].filter(Boolean).map(value => `<span class="pill">${text(value)}</span>`).join("");

      const boundaryList = (moduleData.summary?.boundaries || [])
        .map(value => `<li>${text(value)}</li>`)
        .join("");
      const questionList = (moduleData.primaryQuestions || [])
        .map(value => `<li>${text(value)}</li>`)
        .join("");
      const relationshipHtml = groups
        .map(([key, label]) => renderGroup(key, label, moduleData.relationships?.[key] || []))
        .join("");
      const reviewHtml = renderGroup("reviewQueue", "Review Queue", moduleData.reviewQueue || []);

      document.getElementById("root").innerHTML = `
        <section class="section">
          <h2>Why It Matters</h2>
          <p>${text(moduleData.summary?.whyItMatters || "")}</p>
          <h2>Boundaries</h2>
          <ul>${boundaryList}</ul>
          <h2>Primary Questions</h2>
          <ul>${questionList}</ul>
        </section>
        <div class="grid">${relationshipHtml}${reviewHtml}</div>
      `;
    }

    fetch(modulePath)
      .then(response => {
        if (!response.ok) throw new Error(`Unable to load ${modulePath}`);
        return response.json();
      })
      .then(renderModule)
      .catch(error => {
        document.getElementById("summary").textContent = "This standalone prototype expects to be served from its folder so it can read the JSON module.";
        document.getElementById("root").innerHTML = `
          <section class="section error">
            <h2>Module Load Failed</h2>
            <p>${text(error.message)}</p>
            <p>Canonical data file: <code>${text(modulePath)}</code></p>
          </section>
        `;
      });
  </script>
</body>
</html>
