<div class="journeys-container">

  <!-- ===================== -->
  <!-- JOURNEY SELECTOR -->
  <!-- ===================== -->
  <section class="journey-selector">

    <h2 class="journey-title">Select a Journey  [🪜 Learning Path(Ladder of Jacob)]</h2>

    <div class="journey-picker">
      <select id="journeySelect" class="journey-select">
        <option value="">-- Choose a Journey step --</option>
      </select>

      <button id="startJourneyBtn" class="btn-primary">
        Start Journey step
      </button>
    </div>

  </section>

  <hr class="journey-divider"/>

<!-- ===================== -->
<!-- ACTIVE JOURNEY VIEW -->
<!-- ===================== -->
<section class="journey-card" id="journeyCard" style="display:none;">

  <!-- HEADER -->
  <header class="journey-header">
    <h2 id="journeyTitle" class="journey-h2"></h2>
    <p id="journeyDescription" class="journey-description"></p>
  </header>

  <!-- PROGRESS -->
  <section class="journey-progress">
    <div class="progress-bar">
      <div id="progressFill" class="progress-fill"></div>
    </div>
    <div class="progress-meta">
      <span id="progressText"></span>
    </div>
  </section>

  <!-- STEP VIEW (SINGLE SOURCE OF TRUTH) -->
  <section class="journey-step">

    <div class="step-meta">
      <h3 id="currentStepNumber" class="step-number"></h3>
      <h2 id="currentStepTitle" class="step-title"></h2>
      <p id="currentStepSummary" class="step-summary"></p>
    </div>

    <div id="currentStepArticle" class="step-article"></div>

    <ul id="currentStepReflection" class="step-reflection"></ul>

    <div id="currentStepContent" class="step-content"></div>

  </section>

  <!-- ACTIONS -->
  <footer class="journey-actions">
    <button id="markCompleteBtn" class="btn-success">Mark Step Complete</button>
    <button id="resetJourneyBtn" class="btn-ghost">Reset</button>
  </footer>

</section>
