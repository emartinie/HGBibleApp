<!-- ACTIVE JOURNEY VIEW -->
<section class="card-shell" id="journeyCard" style="display:none;">

  <!-- HEADER -->
  <div class="card-header">

    <button class="card-nav-btn prev-card-btn" type="button" aria-label="Previous step">
      ‹
    </button>

    <div class="card-heading">

      <div class="card-kicker">
        <h2 id="journeyTitle" class="hero-sub">
          Journey Title
        </h2>
      </div>

      <h1 id="currentStepTitle" class="text-xl flame">
        Current Step Title
      </h1>

      <p id="journeyDescription" class="hero-sub">
        Journey description
      </p>

      <div id="currentStepNumber" class="text-xs text-slate-400"></div>

    </div>

    <button class="card-nav-btn next-card-btn" type="button" aria-label="Next step">
      ›
    </button>

  </div>

  <!-- BODY -->
  <div class="card-body">

    <!-- PROGRESS -->
    <div class="journey-progress">
      <div class="progress-bar">
        <div id="progressFill"></div>
      </div>

      <div class="progress-meta">
        <span id="progressText">0 / 0 completed</span>
      </div>
    </div>

    <!-- STEP CONTENT -->
    <section class="content-panel">

      <div id="currentStepSummary" class="fp-sub"></div>

      <div id="currentStepArticle"></div>

      <ul id="currentStepReflection"></ul>

      <div id="currentStepContent"></div>

    </section>

  </div>

  <!-- FOOTER -->
  <div class="card-footer journey-actions">

    <button id="markCompleteBtn" class="btn-success">
      Mark Step Complete
    </button>

    <button id="resetJourneyBtn" class="btn-ghost">
      Reset
    </button>

  </div>

</section>
