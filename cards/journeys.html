<div class="journeys-container">

  <!-- ===================== -->
  <!-- JOURNEY SELECTOR -->
  <!-- ===================== -->
  <section class="journey-selector">

    <h2 class="journey-title">
      Select a Journey [🪜 Learning Path (Ladder of Jacob)]
    </h2>

    <div class="journey-picker">
      <select id="journeySelect" class="journey-select">
        <option value="">-- Choose a Journey step --</option>
      </select>

      <button id="startJourneyBtn" class="btn-primary">
        Start Journey step
      </button>
    </div>

  </section>

  <hr class="journey-divider"/>

  <!-- ===================== -->
  <!-- ACTIVE JOURNEY VIEW -->
  <!-- SINGLE SOURCE OF TRUTH -->
  <!-- ===================== -->
  <section class="card-shell" id="journeyCard" style="display:none;">

    <!-- HEADER -->
    <div class="card-header">

      <button class="card-nav-btn prev-card-btn" type="button" aria-label="Previous step">
        ‹
      </button>

      <div class="card-heading">

        <div class="card-kicker">
          <h2 id="journeyTitle" class="hero-sub"></h2>
        </div>

        <h1 id="currentStepTitle" class="text-xl flame"></h1>

        <p id="journeyDescription" class="hero-sub"></p>

        <div id="currentStepNumber" class="text-xs text-slate-400"></div>

      </div>

      <button class="card-nav-btn next-card-btn" type="button" aria-label="Next step">
        ›
      </button>

    </div>

    <!-- BODY -->
    <div class="card-body">

      <!-- PROGRESS -->
      <div class="journey-progress">

        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>

        <div class="progress-meta">
          <span id="progressText">0 / 0 completed</span>
        </div>

      </div>

      <!-- STEP CONTENT -->
      <section class="content-panel">

        <div id="currentStepSummary" class="step-summary"></div>

        <div id="currentStepArticle" class="step-article"></div>

        <ul id="currentStepReflection" class="step-reflection"></ul>

        <div id="currentStepContent" class="step-content"></div>

      </section>

    </div>

    <!-- FOOTER -->
    <div class="card-footer journey-actions">

      <button id="markCompleteBtn" class="btn-success">
        Mark Step Complete
      </button>

      <button id="resetJourneyBtn" class="btn-ghost">
        Reset
      </button>

    </div>

  </section>

</div>
