<div class="journey-card">
  <div class="journey-header">
    <h2 id="journeyTitle">Journey Title</h2>
    <p id="journeyDescription">Description of journey</p>
  </div>

  <div class="journey-progress">
    <div class="progress-bar">
      <div id="progressFill"></div>
    </div>
    <small id="progressText">0 / 0 completed</small>
  </div>

  <div class="journey-current-step">
    <h3>Current Step</h3>
    <div id="currentStepTitle"></div>
    <button id="continueBtn">Continue</button>
  </div>

  <div class="journey-actions">
    <button id="markCompleteBtn">Mark Complete</button>
    <button id="resetJourneyBtn">Reset</button>
  </div>
</div>
