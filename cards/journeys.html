<div class="journeys-container">

  <!-- ===================== -->
  <!-- JOURNEY SELECTOR -->
  <!-- ===================== -->
  <section class="journey-selector">

    <h2 class="journey-title">Select a Journey  [🪜 Learning Path(Ladder of Jacob)]</h2>

    <div class="journey-picker">
      <select id="journeySelect" class="journey-select">
        <option value="">-- Choose a Journey step --</option>
      </select>

      <button id="startJourneyBtn" class="btn-primary">
        Start Journey step
      </button>
    </div>

  </section>

  <hr class="journey-divider"/>

  <!-- ===================== -->
  <!-- ACTIVE JOURNEY VIEW -->
  <!-- ===================== -->
  <section class="journey-card" id="journeyCard" style="display:none;">

    <!-- HEADER -->
    <header class="journey-header">

      <h2 id="journeyTitle" class="journey-h2">Journey Step Title</h2>

      <p id="journeyDescription" class="journey-description">
        Description of Journey Step
      </p>

    </header>

    <!-- PROGRESS -->
    <section class="journey-progress">

      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>

      <div class="progress-meta">
        <span id="progressText">0 / 0 Steps completed</span>
      </div>

    </section>

    <!-- CURRENT STEP -->
    <section class="journey-step">

      <h3 class="step-label">Current Step</h3>

      <div id="currentStepTitle" class="step-title"></div>

    </section>

    <!-- ACTIONS -->
    <footer class="journey-actions">

      <button id="markCompleteBtn" class="btn-success">
        Mark Step Complete
      </button>

      <button id="resetJourneyBtn" class="btn-ghost">
        Reset Step
      </button>

    </footer>

  </section>

</div>
