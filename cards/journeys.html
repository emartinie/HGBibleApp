<section id="journeyCard" class="card">

  <!-- ===================== -->
  <!-- TOPBAR (optional alignment with MainStage style) -->
  <!-- ===================== -->
  <div class="card-topbar">

    <button class="card-nav-btn prev-card-btn" type="button" aria-label="Previous step">
      ‹
    </button>

    <button class="card-nav-btn next-card-btn" type="button" aria-label="Next step">
      ›
    </button>

    <button class="card-icon-btn utility" title="Reset Journey" id="resetJourneyBtn">
      ↻
    </button>

  </div>

  <!-- ===================== -->
  <!-- HEADER -->
  <!-- ===================== -->
  <div class="card-header">

    <div class="card-heading">

      <div class="card-kicker">
        <h2 id="journeyTitle" class="hero-sub"></h2>
      </div>

      <h1 id="currentStepTitle" class="text-xl flame"></h1>

      <div id="currentStepNumber" class="step-meta-text"></div>

      <p id="journeyDescription" class="hero-sub"></p>

    </div>

  </div>

  <!-- ===================== -->
  <!-- JOURNEY LIST (collapsed panel, like MainStage panels) -->
  <!-- ===================== -->
  <section class="content-panel">

    <div class="section-label">
      Journeys ▼
    </div>

    <div id="journeyList" class="space-y-2">
      <!-- JS injects journey cards here -->
    </div>

  </section>

  <!-- ===================== -->
  <!-- BODY -->
  <!-- ===================== -->
  <div class="card-body">

    <!-- PROGRESS -->
    <div class="journey-progress">

      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>

      <div class="progress-meta">
        <span id="progressText"></span>
      </div>

    </div>

    <!-- STEP CONTENT -->
    <section class="content-panel">

      <div id="currentStepSummary" class="step-summary"></div>

      <div id="currentStepArticle" class="step-article"></div>

      <ul id="currentStepReflection" class="step-reflection"></ul>

      <div id="currentStepContent" class="step-content"></div>

    </section>

  </div>

</section>
