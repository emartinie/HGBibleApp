<div id="trusted-store-widget">

<style>
#trusted-store-widget {
  font-family: Arial, sans-serif;
}

/* HEADER */
#trusted-store-widget .header {
  background: #111;
  color: white;
  padding: 18px;
  text-align: center;
  font-size: 20px;
  border-radius: 10px;
  margin-bottom: 15px;
}

/* CONTAINER */
#trusted-store-widget .container {
  max-width: 1100px;
  margin: auto;
}

/* CARD */
#trusted-store-widget .card {
  background: white;
  border-radius: 14px;
  margin-bottom: 25px;
  padding: 16px;
  box-shadow: 0 2px 14px rgba(0,0,0,0.08);
}

/* TITLE */
#trusted-store-widget .title {
  font-size: 20px;
  margin: 10px 0;
}

/* PRICE */
#trusted-store-widget .price {
  color: #1a7;
  font-weight: bold;
  margin-bottom: 10px;
}

/* CAROUSEL */
#trusted-store-widget .carousel {
  position: relative;
  width: 100%;
  height: 280px;
  overflow: hidden;
  border-radius: 12px;
}

#trusted-store-widget .carousel img {
  width: 100%;
  height: 280px;
  object-fit: cover;
  display: none;
  cursor: zoom-in;
}

#trusted-store-widget .carousel img.active {
  display: block;
}

/* ARROWS */
#trusted-store-widget .arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  padding: 8px 10px;
  cursor: pointer;
}

#trusted-store-widget .left { left: 10px; }
#trusted-store-widget .right { right: 10px; }

/* BUTTON */
#trusted-store-widget .btn {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #111;
  color: white;
  font-size: 14px;
  cursor: pointer;
}

#trusted-store-widget .btn:hover {
  background: #333;
}

/* MODAL */
#trusted-store-widget .modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
}

#trusted-store-widget .modal img {
  max-width: 90%;
  max-height: 90%;
  margin: auto;
  display: block;
  margin-top: 3%;
}
</style>

<!-- HEADER -->
<div class="header">Trusted Community Items</div>

<div class="container">

  <!-- ITEM 1 -->
  <div class="card">

    <div class="carousel" data-index="0">
      <button class="arrow left" onclick="moveSlide(this,-1)">&#10094;</button>

      <img src="shofar1.jpg" class="active" onclick="zoom(this)">
      <img src="shofar2.jpg" onclick="zoom(this)">
      <img src="shofar3.jpg" onclick="zoom(this)">

      <button class="arrow right" onclick="moveSlide(this,1)">&#10095;</button>
    </div>

    <div class="title">Yemenite Shofar</div>
    <div class="price">$150</div>

    <button class="btn" onclick="location.href='pay.html?item=shofar'">
      Request Item
    </button>
  </div>

  <!-- ITEM 2 -->
  <div class="card">

    <div class="carousel" data-index="0">
      <button class="arrow left" onclick="moveSlide(this,-1)">&#10094;</button>

      <img src="tallit1.jpg" class="active" onclick="zoom(this)">
      <img src="tallit2.jpg" onclick="zoom(this)">

      <button class="arrow right" onclick="moveSlide(this,1)">&#10095;</button>
    </div>

    <div class="title">Tallit Prayer Shawl</div>
    <div class="price">$15–$25</div>

    <button class="btn" onclick="location.href='pay.html?item=tallit'">
      Request Item
    </button>
  </div>

  <!-- ITEM 3 -->
  <div class="card">

    <div class="carousel" data-index="0">
      <button class="arrow left" onclick="moveSlide(this,-1)">&#10094;</button>

      <img src="tzitzit1.jpg" class="active" onclick="zoom(this)">
      <img src="tzitzit2.jpg" onclick="zoom(this)">

      <button class="arrow right" onclick="moveSlide(this,1)">&#10095;</button>
    </div>

    <div class="title">Tzitzit with Torah Wrap</div>
    <div class="price">$17</div>

    <button class="btn" onclick="location.href='pay.html?item=tzitzit'">
      Request Item
    </button>
  </div>

</div>

<!-- MODAL -->
<div id="store-modal" class="modal" onclick="closeZoom()">
  <img id="store-modal-img">
</div>

</div>

<script>
function moveSlide(btn, dir) {
  const card = btn.closest(".card");
  const carousel = btn.closest(".carousel");
  const images = carousel.querySelectorAll("img");

  let index = parseInt(carousel.getAttribute("data-index"));

  images[index].classList.remove("active");

  index += dir;

  if (index < 0) index = images.length - 1;
  if (index >= images.length) index = 0;

  images[index].classList.add("active");
  carousel.setAttribute("data-index", index);
}

function zoom(img) {
  document.getElementById("store-modal").style.display = "block";
  document.getElementById("store-modal-img").src = img.src;
}

function closeZoom() {
  document.getElementById("store-modal").style.display = "none";
}
</script>
