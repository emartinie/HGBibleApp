<section id="quizCard" class="card">

  <!-- TOPBAR -->
  <div class="card-topbar">

    <button class="card-fullscreen-btn card-icon-btn primary" title="Expand Card">⛶</button>

    <button class="card-icon-btn nav" title="Home">⌂</button>
    <button class="card-icon-btn nav" title="Previous">←</button>
    <button class="card-icon-btn nav" title="Next">→</button>

    <button class="card-icon-btn audio" title="Audio Guide">🎧</button>
    <button class="card-icon-btn audio" title="Video Walkthrough">▶</button>

    <button class="card-icon-btn utility" title="Search">⌕</button>
    <button class="card-icon-btn utility" title="Bookmark">★</button>
    <button class="card-icon-btn utility" title="Share">⇪</button>
    <button class="card-icon-btn utility" title="Notes">✎</button>
    <button class="card-icon-btn utility" title="Help">?</button>

  </div>

  <!-- HEADER -->
  <div class="card-shell">

    <div class="card-header">

      <button class="card-nav-btn prev-card-btn" aria-label="Previous">‹</button>

      <div class="card-heading">

        <div class="card-kicker">
          <p class="hero-sub text-center">
            Discipleship Engine • NT Question System
          </p>
        </div>

        <h2 class="text-xl flame text-center">
          New Testament Notes Quizzes
        </h2>

        <p class="hero-sub text-center">
          Questions generated from New Testament Notes
        </p>

      </div>

      <button class="card-nav-btn next-card-btn" aria-label="Next">›</button>

    </div>

    <!-- BODY -->
    <div class="card-body">


      <!-- QUESTION Control Panel -->
            <section class="content-panel hg-section">

        <div class="section-label">
          Question Controls
        </div>

       </section>

      <!-- QUESTION -->
      <section class="content-panel hg-section">

        <div class="section-label">
          Question
        </div>

        <div id="quizViewer" class="step-content">

          <div id="quizQuestion">
            Question loads here...
          </div>
      </section>

      <!-- Answer -->
      <section class="content-panel hg-section">

        <div class="section-label">
          Answer
        </div>

          <div id="quizAnswers">
            Answers load here...
          </div>

          <div id="quizMeta"></div>

        </div>

      </section>
            <!-- PROGRESS -->
      <section class="content-panel hg-section">

        <div class="section-label">
          Progress
        </div>

        <div class="progress-bar">
          <div id="quizProgressFill" class="progress-fill"></div>
        </div>

        <div class="text-xs text-slate-400 flex justify-between">
          <span id="quizScore"></span>
          <span id="quizCount"></span>
        </div>

      </section>

            <!-- QUIZ SETS -->
      <section class="content-panel hg-section">

        <div class="section-label">
          Quiz Sets
        </div>

        <div id="quizCategoryList"
     class="max-h-64 overflow-y-auto pr-2 space-y-2">
  Loading quiz sets...
</div>

      </section>





    </div>
  </div>

</section>
