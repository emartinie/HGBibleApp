<section class="hg-card-module">

  <header class="hg-card-head">
    <h2 class="hg-card-title">Biblical Greek Alphabet</h2>
    <p class="hg-card-sub">Koine Greek — language of the New Testament</p>
  </header>

  <section class="hg-panel">

    <div class="card-inner text-center">

      <div class="alephbet-strip">

        <div class="alephbet-page">

          <div class="letter-card">
            <div class="hebrew">Α α</div>
            <div class="name">Alpha</div>
            <div class="sound">a</div>
          </div>

          <div class="letter-card">
            <div class="hebrew">Β β</div>
            <div class="name">Beta</div>
            <div class="sound">b</div>
          </div>

          <div class="letter-card">
            <div class="hebrew">Γ γ</div>
            <div class="name">Gamma</div>
            <div class="sound">g / ng</div>
          </div>

          <div class="letter-card">
            <div class="hebrew">Δ δ</div>
            <div class="name">Delta</div>
            <div class="sound">d</div>
          </div>

        </div>

        <div class="alephbet-page">

          <div class="letter-card">
            <div class="hebrew">Ε ε</div>
            <div class="name">Epsilon</div>
            <div class="sound">e</div>
          </div>

          <div class="letter-card">
            <div class="hebrew">Ζ ζ</div>
            <div class="name">Zeta</div>
            <div class="sound">z</div>
          </div>

          <div class="letter-card">
            <div class="hebrew">Η η</div>
            <div class="name">Eta</div>
            <div class="sound">ē</div>
          </div>

          <div class="letter-card">
            <div class="hebrew">Θ θ</div>
            <div class="name">Theta</div>
            <div class="sound">th</div>
          </div>

        </div>

      </div>

    </div>

  </section>
</section>
