<style>
  .steward-card {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0.85rem 1rem;
  border-radius: 0.9rem;
  border: 1px solid rgba(148, 163, 184, 0.3);
  background: rgba(30, 41, 59, 0.8);
  color: #e2e8f0;
  font-size: 0.95rem;
  transition: 0.2s ease;
}

.steward-card:hover {
  background: rgba(51, 65, 85, 0.95);
}
</style>
<div class="card-topbar">

  <!-- existing fullscreen -->
  <button class="card-fullscreen-btn card-icon-btn primary"
          title="Expand Card">⛶</button>

  <button class="card-icon-btn nav" title="Home">⌂</button>
  <button class="card-icon-btn nav" title="Previous">←</button>
  <button class="card-icon-btn nav" title="Next">→</button>

  <button class="card-icon-btn audio" title="Audio Guide">🎧</button>
  <button class="card-icon-btn audio" title="Video Walkthrough">▶</button>

  <button class="card-icon-btn utility" title="Search Card">⌕</button>
  <button class="card-icon-btn utility" title="Bookmark">★</button>
  <button class="card-icon-btn utility" title="Share">⇪</button>
  <button class="card-icon-btn utility" title="Notes">✎</button>
  <button class="card-icon-btn utility" title="Help">?</button>

</div>
<!--<button class="card-fullscreen-btn" type="button" title="Expand" aria-pressed="false">⛶</button>-->
<section class="mt-10 pt-6 border-t border-slate-700">
  <h3 class="text-lg font-medium mb-3">Shared Stewardship</h3>

  <p class="text-slate-400 text-sm leading-relaxed mb-5 max-w-2xl">
    Some people ask how they can support this work. There is no pressure and no obligation.
    If you choose to participate, use whatever is simplest and most comfortable for you.
  </p>

  <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 max-w-md">
    <a href="https://paypal.me/yourname" class="steward-card" target="_blank" rel="noopener noreferrer">PayPal</a>
    <button type="button" class="steward-card">Zelle</button>
    <button type="button" class="steward-card">Venmo</button>
    <button type="button" class="steward-card">Cash App</button>
    <button type="button" class="steward-card">PayPal</button>
    <button type="button" class="steward-card">Apple Cash</button>
  </div>
</section>
