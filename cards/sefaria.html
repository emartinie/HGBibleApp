<section class="hg-panel">
<div class="card-topbar">

  <!-- existing fullscreen -->
  <button class="card-fullscreen-btn card-icon-btn primary"
          title="Expand Card">⛶</button>

  <button class="card-icon-btn nav" title="Home">⌂</button>
  <button class="card-icon-btn nav" title="Previous">←</button>
  <button class="card-icon-btn nav" title="Next">→</button>

  <button class="card-icon-btn audio" title="Audio Guide">🎧</button>
  <button class="card-icon-btn audio" title="Video Walkthrough">▶</button>

  <button class="card-icon-btn utility" title="Search Card">⌕</button>
  <button class="card-icon-btn utility" title="Bookmark">★</button>
  <button class="card-icon-btn utility" title="Share">⇪</button>
  <button class="card-icon-btn utility" title="Notes">✎</button>
  <button class="card-icon-btn utility" title="Help">?</button>

</div>
<!--<button class="card-fullscreen-btn" type="button" title="Expand" aria-pressed="false">⛶</button>-->
         <div class="card-topbar scripture-subnav">

  <button class="card-icon-btn scripture" id="scriptureSearchBtn" title="Search">
    ⌕
  </button>

  <button class="card-icon-btn scripture" id="scriptureReloadBtn" title="Reload">
    ↻
  </button>

  <button class="card-icon-btn scripture" id="scripturePrevBtn" title="Previous Verse">
    ←
  </button>

  <button class="card-icon-btn scripture" id="scriptureNextBtn" title="Next Verse">
    →
  </button>

  <button class="card-icon-btn scripture" id="copyScriptureBtn" title="Copy">
    ⧉
  </button>

  <button class="card-icon-btn scripture"
          onclick="document.getElementById('scriptureContent').scrollTop = 0"
          title="Top">
    ↑
  </button>

  <button class="card-icon-btn scripture" onclick="goToNT()" title="New Testament">
    ✝
  </button>

  <button class="card-icon-btn scripture" onclick="goBackToCommandments()" title="Commandments">
    ⌘
  </button>

  <button class="card-icon-btn scripture" id="openBridgeBtn" title="Related Context">
    ⛓
  </button>

  <button class="card-icon-btn scripture" id="openSefariaContextBtn" title="Jewish Context">
    ✡
  </button>

  <button class="card-icon-btn scripture" id="ntHomeHeaderBtn" title="Notes">
    ☰
  </button>

  <button class="card-icon-btn scripture" id="ntQuotesHeaderBtn" title="Quotes">
    ❝
  </button>

</div>
  <div class="p-5 space-y-4 text-slate-100">

    <div class="flex items-center justify-between gap-3 flex-wrap">
      <!--<h2 class="text-xl font-semibold text-orange-300">📚 Writings from Sages</h2>-->

      <div class="flex items-center gap-2 flex-wrap">
        <button id="sefariaPrevBtn" class="ui-btn" type="button">← Prev</button>
        <button id="sefariaNextBtn" class="ui-btn" type="button">Next →</button>
      </div>
    </div>

    <div class="text-xs text-slate-500 italic">
      Source: Sefaria
    </div>

    <div class="grid gap-3 sm:grid-cols-[1fr_auto]">


    <div class="grid gap-3 sm:grid-cols-3">

     
    <select id="sefariaBook" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm">
  <optgroup label="Torah">
    <option value="Genesis">Genesis</option>
    <option value="Exodus">Exodus</option>
    <option value="Leviticus">Leviticus</option>
    <option value="Numbers">Numbers</option>
    <option value="Deuteronomy">Deuteronomy</option>
  </optgroup>

  <optgroup label="Historical Books">
    <option value="Joshua">Joshua</option>
    <option value="Judges">Judges</option>
    <option value="Ruth">Ruth</option>
    <option value="1Samuel">1 Samuel</option>
    <option value="2Samuel">2 Samuel</option>
    <option value="1Kings">1 Kings</option>
    <option value="2Kings">2 Kings</option>
    <option value="1Chronicles">1 Chronicles</option>
    <option value="2Chronicles">2 Chronicles</option>
    <option value="Ezra">Ezra</option>
    <option value="Nehemiah">Nehemiah</option>
    <option value="Esther">Esther</option>
  </optgroup>

  <optgroup label="Wisdom">
    <option value="Job">Job</option>
    <option value="Psalms">Psalms</option>
    <option value="Proverbs">Proverbs</option>
    <option value="Ecclesiastes">Ecclesiastes</option>
    <option value="SNG">Song of Solomon</option>
  </optgroup>

  <optgroup label="Prophets">
    <option value="Isaiah">Isaiah</option>
    <option value="Jeremiah">Jeremiah</option>
    <option value="Lamentations">Lamentations</option>
    <option value="Ezekiel">Ezekiel</option>
    <option value="Daniel">Daniel</option>
    <option value="Hosea">Hosea</option>
    <option value="Joel">Joel</option>
    <option value="Amos">Amos</option>
    <option value="Obadiah">Obadiah</option>
    <option value="Jonah">Jonah</option>
    <option value="Micah">Micah</option>
    <option value="Nahum">Nahum</option>
    <option value="Habakkuk">Habakkuk</option>
    <option value="Zephaniah">Zephaniah</option>
    <option value="Haggai">Haggai</option>
    <option value="Zechariah">Zechariah</option>
    <option value="Malachi">Malachi</option>
  </optgroup>
</select>
  </div>

      <div>
        <label class="block text-xs text-slate-400 mb-1">Chapter</label>
        <input
          id="sefariaChapter"
          type="number"
          min="1"
          value="1"
          class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm"
        />
      </div>

      <div class="flex items-end">
        <button id="sefariaLoadBtn" class="ui-btn w-full" type="button">
          Load Text
        </button>
      </div>
    </div>

    <div id="sefariaMeta" class="text-sm text-slate-400"></div>

    <div
      id="sefariaContent"
      class="bg-slate-900/70 border border-slate-700 rounded-xl p-4 max-h-[70vh] overflow-y-auto text-sm leading-relaxed"
    >
      Ready.
    </div>

  </div>
</section>
