<section class="hg-panel jewish-library-card" aria-labelledby="jewishLibraryTitle">
  <div class="card-topbar">
    <button class="card-fullscreen-btn card-icon-btn primary" type="button" title="Expand Card" aria-label="Expand Jewish Library">⛶</button>
  </div>

  <section class="orientation-block hg-panel hg-section p-4 my-4">
    <h2 id="jewishLibraryTitle" class="text-lg font-semibold text-amber-300">✡ Jewish Library</h2>
    <p class="text-sm text-slate-300 mt-2">Search Jewish scripture, rabbinic literature, commentary, law, philosophy, and tradition.</p>
    <p class="text-xs text-slate-400 mt-2">Powered by Sefaria. Results stay within Sefaria’s Jewish textual library.</p>
  </section>

  <div class="p-5 space-y-5 text-slate-100">
    <form id="jewishLibrarySearchForm" class="space-y-3">
      <label class="block">
        <span class="block text-xs text-slate-400 mb-1">Search the Jewish library</span>
        <input id="jewishLibraryQuery" type="search" autocomplete="off"
          placeholder="Try covenant, שבת, Moses, or a phrase"
          class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm" />
      </label>

      <div class="grid gap-3 sm:grid-cols-3">
        <label class="block">
          <span class="block text-xs text-slate-400 mb-1">Collection</span>
          <select id="jewishLibraryCategory" class="ui-select w-full">
            <option value="">Entire Jewish Library</option>
            <option value="Tanakh">Tanakh</option>
            <option value="Tanakh/Torah">Torah</option>
            <option value="Tanakh/Prophets">Nevi’im — Prophets</option>
            <option value="Tanakh/Writings">Ketuvim — Writings</option>
            <option value="Commentary">Jewish Commentary</option>
            <option value="Midrash">Midrash</option>
            <option value="Mishnah">Mishnah</option>
            <option value="Tosefta">Tosefta</option>
            <option value="Talmud">Talmud</option>
            <option value="Halakhah">Halakhah</option>
            <option value="Jewish Thought">Jewish Philosophy & Thought</option>
            <option value="Chasidut">Chasidut</option>
            <option value="Kabbalah">Kabbalah</option>
            <option value="Liturgy">Liturgy</option>
            <option value="Sheets">Source Sheets</option>
          </select>
        </label>

        <label class="block">
          <span class="block text-xs text-slate-400 mb-1">Language</span>
          <select id="jewishLibraryLanguage" class="ui-select w-full">
            <option value="both">Hebrew + English</option>
            <option value="english">English</option>
            <option value="hebrew">Hebrew</option>
          </select>
        </label>

        <label class="flex items-end gap-2 pb-2 text-sm text-slate-300">
          <input id="jewishLibraryExact" type="checkbox" class="accent-amber-400" />
          Exact phrase
        </label>
      </div>

      <button class="ui-btn w-full sm:w-auto" type="submit">Search Jewish Library</button>
    </form>

    <div class="border-t border-slate-700 pt-4">
      <div class="flex items-center justify-between gap-3 flex-wrap">
        <h3 class="text-sm font-semibold text-amber-200">Read or explore a reference</h3>
        <div class="flex gap-2">
          <button id="sefariaPrevBtn" class="ui-btn" type="button" aria-label="Previous chapter">←</button>
          <button id="sefariaNextBtn" class="ui-btn" type="button" aria-label="Next chapter">→</button>
        </div>
      </div>
      <form id="sefariaReferenceForm" class="grid gap-3 sm:grid-cols-[1fr_auto] mt-3">
        <input id="sefariaReference" type="text" value="Genesis 1"
          placeholder="Genesis 1, Berakhot 2a, Rashi on Genesis 1:1"
          class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm" />
        <button class="ui-btn" type="submit">Load Text</button>
      </form>
      <div class="flex gap-2 flex-wrap mt-3">
        <button id="sefariaConnectionsBtn" class="ui-btn" type="button">Explore Connections</button>
        <a id="sefariaOpenBtn" class="ui-btn" href="https://www.sefaria.org/Genesis.1" target="_blank" rel="noopener noreferrer">Open in Sefaria ↗</a>
      </div>
    </div>

    <div id="sefariaMeta" class="text-sm text-slate-400" role="status" aria-live="polite"></div>
    <div id="sefariaContent" class="hg-reader bg-slate-900/70 border border-slate-700 rounded-xl p-4 max-h-[70vh] overflow-y-auto text-sm leading-relaxed">
      <div class="hg-empty">Enter a word, phrase, topic, person, place, or reference.</div>
    </div>
  </div>
</section>
