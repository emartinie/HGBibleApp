<section id="todayCard" class="w-full max-w-md mx-auto px-4 py-6">

  <!-- Header -->
  <div class="text-center mb-6">
    <h1 class="text-2xl font-semibold text-white">Today</h1>
    <p id="todayDatePretty" class="text-slate-400 text-sm mt-1"></p>
    <p id="todayWeekInfo" class="text-slate-500 text-xs mt-1"></p>
    <p id="todaySpecialDay" class="text-amber-400 text-sm mt-2"></p>
  </div>
<div id="todayWeek">Week:</div>
<div id="todayDay">Day:</div>
<div id="todayCycle"></div>
<div id="weekBounds">7 Days:</div>
  <!-- Main Card -->
  <div class="bg-slate-900 border border-slate-700 rounded-xl p-5 shadow-lg">

    <!-- Meditation -->
    <div class="mb-5">
      <h2 class="text-slate-200 font-semibold mb-2">Meditation</h2>
      <p class="text-slate-300 leading-relaxed text-sm" id="todayMeditation">
        Ask for light for the next step, not the whole staircase.
      </p>
    </div>

    <!-- Scripture -->
    <div class="border border-slate-700 rounded-lg p-4 bg-slate-950/40 mb-5">
      <p class="text-slate-400 text-xs mb-2">Today's Scripture</p>
      <p id="todayVerseRef" class="text-slate-300 font-medium"></p>
      <p id="todayVerseText" class="text-slate-200 italic mt-2"></p>
    </div>

    <!-- Weekly context -->
    <div class="text-sm text-slate-400 mb-4">
      <div id="todayReadings"></div>
    </div>

    <!-- Action -->
    <button id="todayListenBtn"
      class="w-full py-3 rounded-lg bg-blue-600 hover:bg-blue-500 text-white font-medium">
      ▶ Listen
    </button>

    <p class="text-center text-xs text-slate-500 mt-2">
      One day. One portion. One step.
    </p>

  </div>
</section>
