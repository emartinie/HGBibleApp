<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Store</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white">

  <div class="max-w-6xl mx-auto px-4 py-10">

    <!-- Header -->
    <header class="mb-10 text-center">
      <h1 class="text-3xl font-bold text-cyan-300">Simple Store</h1>
      <p class="text-slate-400 mt-2">Select a product and place an order</p>
    </header>

    <!-- Product Grid -->
    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">

      <!-- PRODUCT CARD -->
      <div class="bg-slate-900 border border-slate-700 rounded-2xl overflow-hidden shadow-lg">
        <img src="images/product1.jpg" class="w-full h-48 object-cover" />

        <div class="p-4 space-y-3">
          <h2 class="text-lg font-semibold">Product One</h2>
          <p class="text-slate-400 text-sm">$25.00</p>

          <button
            onclick="order('Product One', 25)"
            class="w-full py-2 rounded-lg bg-cyan-600 hover:bg-cyan-500 text-white font-medium"
          >
            Order
          </button>
        </div>
      </div>

      <!-- PRODUCT 2 -->
      <div class="bg-slate-900 border border-slate-700 rounded-2xl overflow-hidden shadow-lg">
        <img src="images/product2.jpg" class="w-full h-48 object-cover" />

        <div class="p-4 space-y-3">
          <h2 class="text-lg font-semibold">Product Two</h2>
          <p class="text-slate-400 text-sm">$40.00</p>

          <button
            onclick="order('Product Two', 40)"
            class="w-full py-2 rounded-lg bg-cyan-600 hover:bg-cyan-500 text-white font-medium"
          >
            Order
          </button>
        </div>
      </div>

      <!-- PRODUCT 3 -->
      <div class="bg-slate-900 border border-slate-700 rounded-2xl overflow-hidden shadow-lg">
        <img src="images/product3.jpg" class="w-full h-48 object-cover" />

        <div class="p-4 space-y-3">
          <h2 class="text-lg font-semibold">Product Three</h2>
          <p class="text-slate-400 text-sm">$60.00</p>

          <button
            onclick="order('Product Three', 60)"
            class="w-full py-2 rounded-lg bg-cyan-600 hover:bg-cyan-500 text-white font-medium"
          >
            Order
          </button>
        </div>
      </div>

    </div>
  </div>

  <script>
    function order(product, price) {
      const email = "your@email.com";

      const subject = encodeURIComponent("Order Request: " + product);
      const body = encodeURIComponent(
        `Product: ${product}\nPrice: $${price}\n\nPlease confirm availability and next steps.`
      );

      window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
    }
  </script>

</body>
</html>
