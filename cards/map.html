<section class="hg-map-card">
  <style>
    .hg-map-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
      color: #eef3ff;
    }

    .hg-map-head {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .hg-map-kicker {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #a8b2c7;
    }

    .hg-map-title {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 800;
      color: #ffe7b0;
      line-height: 1.1;
    }

    .hg-map-sub {
      margin: 0;
      color: #a8b2c7;
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .hg-map-panel {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 18px;
      padding: 12px;
    }

    #hgMapCanvas {
      width: 100%;
      height: 420px;
      border-radius: 14px;
      overflow: hidden;
      background: #0f172a;
    }
  </style>

  <header class="hg-map-head">
    <div class="hg-map-kicker">Map</div>
    <h2 class="hg-map-title">HomeGroups Map</h2>
    <p class="hg-map-sub">Clean map test: one working map, one working marker.</p>
  </header>

  <div style="display:flex; justify-content:flex-end; margin-bottom:10px;">
  <button type="button" onclick="locateUser()" style="
    border:none;
    border-radius:999px;
    min-height:40px;
    padding:0 14px;
    background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.10);
    color:#eef3ff;
    font:inherit;
    cursor:pointer;
  ">📍 Locate Me</button>
</div>

  <section class="hg-map-panel">
    <div id="hgMapCanvas"></div>
  </section>
</section>
