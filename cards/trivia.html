<section class="hg-card-module">
  <style>
    .hg-card-module{
      color:#eef3ff;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .hg-card-head{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .hg-card-kicker{
      font-size:.72rem;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:#a8b2c7;
    }

    .hg-card-title{
      margin:0;
      font-size:1.15rem;
      font-weight:800;
      color:#ffe7b0;
      line-height:1.1;
    }

    .hg-card-sub{
      margin:0;
      color:#a8b2c7;
      font-size:.92rem;
      line-height:1.45;
    }

    .hg-panel{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.10);
      border-radius:18px;
      padding:14px;
    }

    .hg-section-label{
      font-size:.72rem;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:#f3c878;
      margin-bottom:8px;
    }

    .hg-empty{
      color:#a8b2c7;
      font-size:.92rem;
      padding:14px;
      border:1px dashed rgba(255,255,255,.12);
      border-radius:14px;
      text-align:center;
    }

    .hg-btn-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .hg-btn{
      border:none;
      border-radius:999px;
      min-height:40px;
      padding:0 14px;
      background:rgba(255,255,255,.07);
      color:#eef3ff;
      border:1px solid rgba(255,255,255,.10);
      font:inherit;
    }
  </style>
