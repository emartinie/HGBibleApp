<style>
  .map-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(20,20,30,0.65);
    backdrop-filter: blur(10px);
    color: white;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .map-btn:hover {
    background: rgba(0, 255, 255, 0.15);
    box-shadow: 0 0 10px rgba(0,255,255,0.5);
    transform: scale(1.05);
  }
</style>

<body>
<section class="hg-panel prayer-map-card">

  <input
    id="prayerMapSearch"
    type="text"
    placeholder="Search prayers..."
    class="w-full px-4 py-3 rounded-full bg-slate-900/80 backdrop-blur-md border border-slate-700 text-slate-200 text-sm placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-amber-500/40"
  />

  <button
    type="button"
    onclick="locateUser()"
    style="
      border:none;
      border-radius:999px;
      min-height:40px;
      padding:0 14px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.10);
      color:#eef3ff;
      font:inherit;
      cursor:pointer;
    "
  >
    📍
  </button>

  <p class="text-sm text-slate-300 mt-1">
    Gather, search, pray for each other and lift one another up.
  </p>

  <div class="relative bg-slate-900/90 border border-slate-700 rounded-3xl shadow-2xl overflow-hidden">
    <div id="prayerMap" class="relative h-[480px] w-full z-10"></div>

    <div class="pointer-events-none absolute inset-0 flex items-center justify-center z-20">
      <div class="w-72 h-72 rounded-full bg-[radial-gradient(circle,rgba(255,120,0,0.18),transparent_70%)] blur-2xl opacity-60"></div>
    </div>

    <div class="absolute bottom-0 inset-x-0 z-30 bg-gradient-to-t from-black via-black/80 to-transparent p-6 text-center">
      <button id="midpointBtn" class="map-btn" title="Find Midpoint">
        ⚖️
      </button>

      <p class="text-slate-300 text-sm mb-3">
        We gather here to lift one another up.
      </p>

      <button
        id="prayerMapAddBtn"
        type="button"
        class="mt-3 px-4 py-2 rounded-xl bg-orange-600/90 hover:bg-orange-600 text-white text-sm font-medium transition shadow-lg"
      >
        ✚ Prayer
      </button>
    </div>
  </div>

  <!-- Prayer Modal -->
  <div
    id="prayerPorchPanel"
    class="hidden fixed inset-0 z-50 bg-black/50 items-center justify-center"
  >
    <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-[90%] max-w-md text-center shadow-2xl">
      <h2
        id="prayerPorchTitle"
        class="text-xl font-semibold text-orange-300 mb-2"
      >
        Welcome. Add Prayer
      </h2>

      <div
        id="prayerPorchMessage"
        class="text-slate-300 leading-relaxed mb-4"
      >
        You're not alone here.
      </div>

      <button
        id="prayerPorchCloseBtn"
        type="button"
        class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-500 text-white"
      >
        Close
      </button>
    </div>
  </div>

</section>
</body>
