<script>
  let selectedPoints = [];

map.on("click", (e) => {
  if (selectedPoints.length >= 2) selectedPoints = [];

  selectedPoints.push([e.latlng.lat, e.latlng.lng]);

  L.marker(e.latlng).addTo(map);

  if (selectedPoints.length === 2) {
    const midLat = (selectedPoints[0][0] + selectedPoints[1][0]) / 2;
    const midLng = (selectedPoints[0][1] + selectedPoints[1][1]) / 2;

    L.marker([midLat, midLng])
      .addTo(map)
      .bindPopup("Midpoint")
      .openPopup();
  }
});
</script>
