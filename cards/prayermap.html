<section class="hg-panel prayer-map-card">
  <button class="card-fullscreen-btn" type="button" title="Expand" aria-pressed="false">⛶</button>
  <div class="p-5 space-y-5">

    <div class="text-center">
      <div class="label-pill text-slate-400">Prayer Map</div>
      <h2 class="text-xl font-bold text-orange-300">
        Community Map • Family Explorer
      </h2>
      <p class="text-sm text-slate-300 mt-1">
        Gather, search, pray, and explore community connections.
                <button
          id="prayerMapAddBtn"
          type="button"
          class="px-4 py-2 rounded-xl bg-orange-600/90 hover:bg-orange-600 text-white text-sm font-medium transition shadow-lg"
        >
          ✚ Add Prayer
        </button>
      </p>
    </div>

    <div class="relative bg-slate-900/90 border border-slate-700 rounded-3xl shadow-2xl overflow-hidden">

      <!-- Search -->
      <div class="absolute top-4 left-1/2 -translate-x-1/2 z-40 w-[90%] max-w-md">
        <input
          id="prayerMapSearch"
          type="text"
          placeholder="Search prayers, people, communities..."
          class="w-full px-4 py-3 rounded-full bg-slate-900/80 backdrop-blur-md border border-slate-700 text-slate-200 text-sm placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-amber-500/40"
        />
      </div>

      <!-- Top controls -->
      <div class="absolute top-4 right-4 flex gap-2 z-40">
       <!-- <button
          id="prayerMapExpandBtn"
          type="button"
          class="px-4 py-2 rounded-xl bg-black/60 backdrop-blur-md text-white text-sm border border-slate-600 hover:bg-black/80 transition"
        >
          🗺️ Expand
        </button>-->


      </div>

      <!-- Results drawer -->
      <div
        id="prayerResultsDrawer"
        class="absolute top-0 left-0 right-0 translate-y-[-100%] transition-transform duration-300 ease-out z-30"
      >
        <div class="mt-20 mx-auto w-[92%] max-w-md bg-slate-900/95 backdrop-blur-md border border-slate-700 rounded-2xl shadow-2xl overflow-hidden">
          <div
            id="prayerResultsList"
            class="max-h-[300px] overflow-y-auto p-3 space-y-2 text-sm text-slate-200"
          ></div>
        </div>
      </div>

      <!-- Community side panel -->
      <div
        id="prayerCommunityPanel"
        class="absolute bottom-4 right-4 w-60 max-h-[43vh] bg-slate-900/70 backdrop-blur-md border border-slate-700/60 rounded-2xl shadow-2xl flex flex-col overflow-hidden transform translate-x-full transition-transform duration-300 ease-out z-30"
      >
        <div class="p-3 text-sm font-bold border-b border-slate-700 text-slate-200">
          Community
        </div>
        <div
          id="prayerCommunityList"
          class="flex-1 overflow-y-auto p-2 space-y-2 text-sm text-slate-300"
        ></div>
      </div>

      <!-- Map -->
      <div id="prayerMap" class="relative h-[480px] w-full z-10"></div>

      <!-- Center glow -->
      <div class="pointer-events-none absolute inset-0 flex items-center justify-center z-20">
        <div class="w-72 h-72 rounded-full bg-[radial-gradient(circle,rgba(255,120,0,0.18),transparent_70%)] blur-2xl opacity-60"></div>
      </div>

      <!-- Bottom bar -->
      <div class="absolute bottom-0 inset-x-0 z-30 bg-gradient-to-t from-black via-black/80 to-transparent p-6 text-center">
        <p class="text-slate-300 text-sm mb-3">
          We gather here to lift one another up.
        </p>

        <div class="flex justify-center gap-4 flex-wrap">
          <!--<button
            id="prayTogetherBtn"
            type="button"
            class="px-6 py-2 rounded-full bg-amber-600 hover:bg-amber-500 text-white font-medium transition"
          >
            🙏 Pray Together
          </button>-->

          <button
            id="joinCommunityBtn"
            type="button"
            class="px-6 py-2 rounded-full bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-600 transition"
          >
            🤝 Join Community
          </button>
        </div>
      </div>
    </div>

    <!-- Porch / modal fallback -->
    <div
      id="prayerPorchPanel"
      class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center"
    >
      <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-[90%] max-w-md text-center shadow-2xl">
        <h2 id="prayerPorchTitle" class="text-xl font-semibold text-orange-300 mb-2">
          Welcome
        </h2>

        <p id="prayerPorchMessage" class="text-slate-300 leading-relaxed mb-4">
          You're not alone here.
        </p>

        <button
          id="prayerPorchCloseBtn"
          type="button"
          class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-500 text-white"
        >
          Close
        </button>
      </div>
    </div>

  </div>
</section>
