
<section class="hg-panel flex flex-col h-full">
<input
  id="articleSearch"
  placeholder="Search articles..."
  class="w-full mb-2 px-3 py-2 rounded bg-slate-800 text-sm outline-none"
/>
  <button class="card-fullscreen-btn self-end m-2" type="button" title="Expand">⛶</button>

  <div class="flex flex-col h-full gap-3 p-4">

    <!-- LIST (collapsed, scrollable) -->
    <div
      id="articleList"
      class="max-h-[30vh] overflow-y-auto space-y-2 border border-slate-700 rounded-lg p-2 bg-slate-900/50"
    ></div>

    <!-- VIEWER (main focus) -->
    <div
      id="articleViewer"
      class="flex-1 overflow-y-auto bg-slate-900 border border-slate-700 rounded-xl p-4 text-sm leading-relaxed"
    >
      Select an article...
    </div>

  </div>
</section>
