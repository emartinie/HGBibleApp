<style>
.article-viewer {
  padding: 1.5rem;
}

.article-viewer article {
  max-width: 850px;
  margin: 0 auto;
  color: var(--text);
  line-height: 1.8;
}

.article-viewer h1 {
  font-size: 2rem;
  margin-bottom: 1rem;
}

.article-viewer h2 {
  font-size: 1.35rem;
  margin-top: 2rem;
  margin-bottom: 0.75rem;
  color: var(--gold);
  border-bottom: 1px solid var(--line);
  padding-bottom: .4rem;
}

.article-viewer p {
  margin-bottom: 1rem;
}

.article-viewer blockquote {
  margin: 1.5rem 0;
  padding: 1rem 1.25rem;
  border-left: 4px solid var(--gold);
  background: rgba(255,255,255,.03);
  border-radius: .5rem;
  font-style: italic;
}

.article-viewer ul,
.article-viewer ol {
  margin: 1rem 0 1rem 1.5rem;
}

.article-viewer li {
  margin-bottom: .5rem;
}

  color: var(--gold);
}

  <section class="hg-panel hg-section flex flex-col h-full">
<input
  id="articleSearch"
  placeholder="Search articles..."
  class="w-full mb-2 px-3 py-2 rounded bg-slate-800 text-sm outline-none"
/>
<div class="card-topbar">

  <!-- existing fullscreen -->
  <button class="card-fullscreen-btn card-icon-btn primary"
          title="Expand Card">⛶</button>

  <button class="card-icon-btn nav" title="Home">⌂</button>
  <button class="card-icon-btn nav" title="Previous">←</button>
  <button class="card-icon-btn nav" title="Next">→</button>

  <button class="card-icon-btn audio" title="Audio Guide">🎧</button>
  <button class="card-icon-btn audio" title="Video Walkthrough">▶</button>

  <button class="card-icon-btn utility" title="Search Card">⌕</button>
  <button class="card-icon-btn utility" title="Bookmark">★</button>
  <button class="card-icon-btn utility" title="Share">⇪</button>
  <button class="card-icon-btn utility" title="Notes">✎</button>
  <button class="card-icon-btn utility" title="Help">?</button>

</div>
<!--<button class="card-fullscreen-btn" type="button" title="Expand" aria-pressed="false">⛶</button>-->
  <div class="flex flex-col h-full gap-3 p-4">

    <!-- LIST (collapsed, scrollable) -->
    <div
      id="articleList"
      class="hg-section max-h-[30vh] overflow-y-auto space-y-2 border border-slate-700 rounded-lg p-2 bg-slate-900/50"
    ></div>

    <!-- VIEWER (main focus) -->
    <div
      id="articleViewer"
      class="hg-section article-viewer flex-1 overflow-y-auto"
    >
      Select an article...
    </div>

  </div>
</section>
