<section class="hg-card-module hg-card-shell">
  <style>
    .payment-placeholder-card {
      display: grid;
      gap: 0.85rem;
      padding: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      color: #f8fafc;
      background: linear-gradient(145deg, #111827, #1f2937);
    }

    .payment-placeholder-card h2 {
      margin: 0;
      color: #f1c76b;
      font-size: 1.35rem;
      font-weight: 900;
    }

    .payment-placeholder-card p {
      margin: 0;
      color: rgba(248, 250, 252, 0.78);
      line-height: 1.5;
    }

    .payment-placeholder-card .payment-note {
      padding: 0.85rem;
      border: 1px solid rgba(241, 199, 107, 0.22);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.18);
    }

    .payment-placeholder-card button {
      min-height: 2.6rem;
      border: 1px solid rgba(241, 199, 107, 0.34);
      border-radius: 8px;
      color: #121212;
      background: #f1c76b;
      font-weight: 850;
    }
  </style>

  <div class="payment-placeholder-card">
    <h2>Payment Is Manual</h2>
    <p>The store is using request-first ordering for now. Browse the Store card, choose an item, and create an email request before sending payment.</p>
    <div class="payment-note">
      <p>No payment processor is wired here yet. This keeps the public app honest until checkout details are ready.</p>
    </div>
    <button type="button" onclick="window.loadCard?.('store')">Back to Store</button>
  </div>
</section>
