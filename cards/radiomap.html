<section class="card" id="radioMapCard">
<div class="card-topbar">

  <!-- existing fullscreen -->
  <button class="card-fullscreen-btn card-icon-btn primary"
          title="Expand Card">⛶</button>

  <button class="card-icon-btn nav" title="Home">⌂</button>
  <button class="card-icon-btn nav" title="Previous">←</button>
  <button class="card-icon-btn nav" title="Next">→</button>

  <button class="card-icon-btn audio" title="Audio Guide">🎧</button>
  <button class="card-icon-btn audio" title="Video Walkthrough">▶</button>

  <button class="card-icon-btn utility" title="Search Card">⌕</button>
  <button class="card-icon-btn utility" title="Bookmark">★</button>
  <button class="card-icon-btn utility" title="Share">⇪</button>
  <button class="card-icon-btn utility" title="Notes">✎</button>
  <button class="card-icon-btn utility" title="Help">?</button>

</div>
<!--<button class="card-fullscreen-btn" type="button" title="Expand" aria-pressed="false">⛶</button>-->  <!--<div class="card-header">
    <h2>📡 Radio Map</h2>
  </div>-->

  <div class="card-content">
<section class="card radio-map-card" id="radiomap">
    <div class="map-toolbar">
      <select id="mapFilterZone">
        <option value="all">All Zones</option>
        <option value="dickson">Dickson</option>
        <option value="bardstown">Bardstown</option>
        <option value="winchester">Winchester</option>
        <option value="field">Field</option>
        <option value="admin">Admin</option>
      </select>

      <select id="mapFilterType">
        <option value="all">All Types</option>
        <option value="repeater">Repeaters</option>
        <option value="simplex">Simplex</option>
        <option value="family">Family</option>
      </select>

      <select id="mapFilterStatus">
        <option value="all">All Status</option>
        <option value="active">Active</option>
        <option value="planned">Planned</option>
      </select>

      <input id="mapFilterSearch" type="text" placeholder="Search..." />
      <button id="mapFilterReset">Reset</button>
    </div>
          <div id="map" style="width:100%; height:100%; min-height:560px; border-radius:18px; overflow:hidden;"></div>

    <!--<div id="radioMap" style="height: 60vh; width: 100%; border-radius: 16px;"></div>-->

  </div>
</section>
