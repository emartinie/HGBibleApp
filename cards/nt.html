<style>
  .scripture-reader {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .scripture-reader p {
    margin: 0;
    padding: 0.4rem 0.65rem;
    border-radius: 0.75rem;
    line-height: 1.8;
    transition: 0.2s ease;
  }

  .scripture-reader p:hover {
    background: rgba(30, 41, 59, 0.35);
  }

  .scripture-reader .v-num,
  .scripture-reader [data-number],
  .scripture-reader .verse-number {
    color: rgb(148 163 184);
    font-size: 0.8em;
    margin-right: 0.45rem;
  }

  .scripture-reader h1,
  .scripture-reader h2,
  .scripture-reader h3,
  .scripture-reader h4 {
    color: rgb(186 230 253);
    margin: 0.5rem 0 0.25rem;
  }

  .scripture-reader small,
  .scripture-reader sup {
    color: rgb(148 163 184);
  }

  .scripture-reader br + br {
    display: none;
  }

  .disabled-btn {
    opacity: 0.45;
    pointer-events: none;
    filter: grayscale(1);
  }

  #nt-book-grid .nt-book-tile {
    transform-origin: center;
    will-change: transform;
  }

  @media (hover: hover) and (pointer: fine) {
    #nt-book-grid .nt-book-tile:hover,
    #nt-book-grid .nt-book-tile:focus-within {
      animation: nt-book-wheel-pop 560ms cubic-bezier(0.2, 0.8, 0.2, 1) 1;
    }
  }

  @media (hover: none), (pointer: coarse) {
    #nt-book-grid .nt-book-tile:active,
    #nt-book-grid .nt-book-tile:focus-within {
      transform: translateY(-1px) rotateZ(0.5deg);
    }
  }

  @keyframes nt-book-wheel-pop {
    0% {
      transform: translateY(0) rotateZ(0deg) rotateY(0deg);
    }
    35% {
      transform: translateY(-3px) rotateZ(-1.5deg) rotateY(9deg);
    }
    70% {
      transform: translateY(-1px) rotateZ(1deg) rotateY(-5deg);
    }
    100% {
      transform: translateY(0) rotateZ(0deg) rotateY(0deg);
    }
  }

  @media (prefers-reduced-motion: reduce) {
    #nt-book-grid .nt-book-tile,
    #nt-book-grid .nt-book-tile:hover,
    #nt-book-grid .nt-book-tile:focus-within,
    #nt-book-grid .nt-book-tile:active {
      animation: none;
      transform: none;
      transition: none;
      will-change: auto;
    }
  }
</style>
