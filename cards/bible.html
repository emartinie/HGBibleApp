<style>
  .scripture-reader {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .scripture-reader p {
    margin: 0;
    padding: 0.4rem 0.65rem;
    border-radius: 0.75rem;
    line-height: 1.8;
    transition: 0.2s ease;
  }

  .scripture-reader p:hover {
    background: rgba(30, 41, 59, 0.35);
  }

  .scripture-reader .v-num,
  .scripture-reader [data-number],
  .scripture-reader .verse-number {
    color: rgb(148 163 184);
    font-size: 0.8em;
    margin-right: 0.45rem;
  }

  .scripture-reader h1,
  .scripture-reader h2,
  .scripture-reader h3,
  .scripture-reader h4 {
    color: rgb(186 230 253);
    margin: 0.5rem 0 0.25rem;
  }

  .scripture-reader small,
  .scripture-reader sup {
    color: rgb(148 163 184);
  }

  .scripture-reader br + br {
    display: none;
  }

  .disabled-btn {
    opacity: 0.45;
    pointer-events: none;
    filter: grayscale(1);
  }
</style>

<section class="hg-panel">
  <div class="p-5 space-y-5 text-slate-100">

    <!-- HEADER -->
    <div class="flex items-center justify-between">
      <div>
       <!-- <h2 class="text-xl font-semibold text-orange-300">📖 Scripture Reader</h2>
        <p class="text-xs text-slate-400">Search, study, compare, and explore context.</p>
      </div>
    </div>-->

    <!-- QUICK SEARCH -->
    <div class="grid gap-3 sm:grid-cols-[1fr_auto_auto]">
      <input
        id="scriptureSearch"
        type="text"
        placeholder="John 3:16, Genesis 1, Romans 8"
        class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm"
      />

      <button id="scriptureSearchBtn" class="ui-btn">
        Go
      </button>

      <button id="scriptureReloadBtn" class="ui-btn">
        Reload
      </button>
    </div>

    <!-- STRUCTURED LOAD -->
    <div class="grid gap-3 sm:grid-cols-4">
      <select id="scriptureVersion" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-3 text-sm">
        <option value="KJV">KJV</option>
        <option value="AMP">AMP</option>
        <option value="NASB">NASB</option>
      </select>

      <select id="scriptureBook" class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-3 text-sm">
  <optgroup label="Torah">
    <option value="GEN">Genesis</option>
    <option value="EXO">Exodus</option>
    <option value="LEV">Leviticus</option>
    <option value="NUM">Numbers</option>
    <option value="DEU">Deuteronomy</option>
  </optgroup>

  <optgroup label="Historical Books">
    <option value="JOS">Joshua</option>
    <option value="JDG">Judges</option>
    <option value="RUT">Ruth</option>
    <option value="1SA">1 Samuel</option>
    <option value="2SA">2 Samuel</option>
    <option value="1KI">1 Kings</option>
    <option value="2KI">2 Kings</option>
    <option value="1CH">1 Chronicles</option>
    <option value="2CH">2 Chronicles</option>
    <option value="EZR">Ezra</option>
    <option value="NEH">Nehemiah</option>
    <option value="EST">Esther</option>
  </optgroup>

  <optgroup label="Wisdom">
    <option value="JOB">Job</option>
    <option value="PSA">Psalms</option>
    <option value="PRO">Proverbs</option>
    <option value="ECC">Ecclesiastes</option>
    <option value="SNG">Song of Solomon</option>
  </optgroup>

  <optgroup label="Prophets">
    <option value="ISA">Isaiah</option>
    <option value="JER">Jeremiah</option>
    <option value="LAM">Lamentations</option>
    <option value="EZK">Ezekiel</option>
    <option value="DAN">Daniel</option>
    <option value="HOS">Hosea</option>
    <option value="JOL">Joel</option>
    <option value="AMO">Amos</option>
    <option value="OBA">Obadiah</option>
    <option value="JON">Jonah</option>
    <option value="MIC">Micah</option>
    <option value="NAM">Nahum</option>
    <option value="HAB">Habakkuk</option>
    <option value="ZEP">Zephaniah</option>
    <option value="HAG">Haggai</option>
    <option value="ZEC">Zechariah</option>
    <option value="MAL">Malachi</option>
  </optgroup>

  <optgroup label="New Testament">
    <option value="MAT">Matthew</option>
    <option value="MRK">Mark</option>
    <option value="LUK">Luke</option>
    <option value="JHN">John</option>
    <option value="ACT">Acts</option>
    <option value="ROM">Romans</option>
    <option value="1CO">1 Corinthians</option>
    <option value="2CO">2 Corinthians</option>
    <option value="GAL">Galatians</option>
    <option value="EPH">Ephesians</option>
    <option value="PHP">Philippians</option>
    <option value="COL">Colossians</option>
    <option value="1TH">1 Thessalonians</option>
    <option value="2TH">2 Thessalonians</option>
    <option value="1TI">1 Timothy</option>
    <option value="2TI">2 Timothy</option>
    <option value="TIT">Titus</option>
    <option value="PHM">Philemon</option>
    <option value="HEB">Hebrews</option>
    <option value="JAS">James</option>
    <option value="1PE">1 Peter</option>
    <option value="2PE">2 Peter</option>
    <option value="1JN">1 John</option>
    <option value="2JN">2 John</option>
    <option value="3JN">3 John</option>
    <option value="JUD">Jude</option>
    <option value="REV">Revelation</option>
  </optgroup>

</select>
  </div>

      <input
        id="scriptureChapter"
        type="number"
        min="1"
        value="1"
        class="bg-slate-800 border border-slate-700 rounded-xl px-3 py-3 text-sm"
      />

      <button id="scriptureLoadBtn" class="ui-btn">
        Load
      </button>
    </div>

    <!-- PRIMARY NAV -->
    <div class="flex flex-wrap gap-2">
      <button id="scripturePrevBtn" class="ui-btn">← Prev</button>
      <button id="scriptureNextBtn" class="ui-btn">Next →</button>
      <button id="copyScriptureBtn" class="ui-btn">Copy</button>
      <button onclick="document.getElementById('scriptureContent').scrollTop = 0" class="ui-btn">
        ↑ Top
      </button>
    </div>

    <!-- RELATED TOOLS -->
    <div class="flex flex-wrap gap-2 border-t border-slate-800 pt-4">
      <button onclick="goToNT()" class="ui-btn">✝️ NT View</button>
      <button onclick="goBackToCommandments()" class="ui-btn">🔙 Commandments</button>
      <button id="openBridgeBtn" class="ui-btn">Related Context</button>
      <button id="openSefariaContextBtn" class="ui-btn">Jewish Context</button>
      <button id="ntHomeHeaderBtn" class="ui-btn">NT Notes</button>
      <button id="ntQuotesHeaderBtn" class="ui-btn">NT Quotes</button>
    </div>

    <!-- FUTURE BUTTONS / DISABLED -->
    <div class="flex flex-wrap gap-2 border-t border-slate-800 pt-4">
      <button class="ui-btn disabled-btn">Commentary</button>
      <button class="ui-btn disabled-btn">Articles</button>
      <button class="ui-btn disabled-btn">Outlines</button>
      <button class="ui-btn disabled-btn">Sources</button>
      <button class="ui-btn disabled-btn">This Week</button>
    </div>

    <!-- META -->
    <div id="scriptureMeta" class="text-sm text-slate-400"></div>

    <!-- CONTENT -->
    <div
      id="scriptureContent"
      class="scripture-reader bg-gradient-to-b from-slate-900/80 to-black/70 border border-slate-700 rounded-2xl p-5 max-h-[70vh] overflow-y-auto text-sm leading-relaxed shadow-inner backdrop-blur-sm"
    >
      Loading scripture...
    </div>

    <!-- FOOTER -->
    <div class="text-xs text-slate-500 italic border-t border-slate-800 pt-3">
      Source: api.bible
    </div>

  </div>
</section>
