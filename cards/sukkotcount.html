<section class="hg-omer-card">

  <!-- TOPBAR -->
  <div class="card-topbar">

    <button class="card-fullscreen-btn card-icon-btn primary" title="Expand Card">⛶</button>

    <button class="card-icon-btn nav" id="sukkotHome" title="Home">⌂</button>
    <button class="card-icon-btn nav" id="sukkotPrev" title="Previous">←</button>
    <button class="card-icon-btn nav" id="sukkotNext" title="Next">→</button>

    <button class="card-icon-btn audio" title="Audio Guide">🎧</button>
    <button class="card-icon-btn audio" title="Video Walkthrough">▶</button>

    <button class="card-icon-btn utility" title="Search Card">⌕</button>
    <button class="card-icon-btn utility" title="Bookmark">★</button>
    <button class="card-icon-btn utility" title="Share">⇪</button>
    <button class="card-icon-btn utility" title="Notes">✎</button>
    <button class="card-icon-btn utility" title="Help">?</button>

  </div>

  <!-- HEADER -->
  <section class="hg-omer-panel">
    <div id="sukkotDayNumber" class="hg-omer-big">--</div>
    <div id="sukkotTitle" class="hg-omer-title">Loading Sukkot...</div>
    <div id="sukkotHebrew" class="hg-omer-hebrew">--</div>

    <p>Progress Bar:</p>
    <div class="hg-progress-wrap">
      <div id="sukkotProgressBar" class="hg-progress-bar"></div>
    </div>

    <div class="hg-omer-grid">
      <div id="sukkotWeekDay" class="hg-omer-chip"><strong>Week / Day:</strong> --</div>
      <div id="sukkotTheme" class="hg-omer-chip"><strong>Theme:</strong> --</div>
      <div id="sukkotDetail" class="hg-omer-chip"><strong>Details:</strong> Loading...</div>
    </div>
  </section>

  <!-- CONTENT -->
  <section class="hg-omer-panel">
    <div class="hg-omer-kicker" style="margin-bottom:8px;">Meditations</div>

    <h3 id="sukkotMeditationTitle" class="hg-omer-meditation-title">
      Loading...
    </h3>

    <div id="sukkotMeditationText" class="hg-omer-note"></div>
    <div id="sukkotMeditationPrayer" class="hg-omer-note"></div>
    <div id="sukkotMeditationScripture" class="hg-omer-note"></div>
  </section>

</section>
