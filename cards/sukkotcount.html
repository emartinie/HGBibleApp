<section class="hg-omer-card" id="sukkotCard">

  <div class="card-topbar">
    <button class="card-fullscreen-btn card-icon-btn primary">⛶</button>
    <button class="card-icon-btn nav">⌂</button>
    <button class="card-icon-btn nav">←</button>
    <button class="card-icon-btn nav">→</button>
    <button class="card-icon-btn audio">🎧</button>
    <button class="card-icon-btn audio">▶</button>
    <button class="card-icon-btn utility">⌕</button>
    <button class="card-icon-btn utility">★</button>
    <button class="card-icon-btn utility">⇪</button>
    <button class="card-icon-btn utility">✎</button>
    <button class="card-icon-btn utility">?</button>
  </div>

  <section class="hg-omer-panel">
    <div id="sukkotDayNumber" class="hg-omer-big">--</div>
    <div id="sukkotTitle" class="hg-omer-title">Loading Sukkot...</div>
    <div id="sukkotHebrew" class="hg-omer-hebrew">טוען...</div>

    <div class="hg-progress-wrap">
      <div id="sukkotProgressBar" class="hg-progress-bar"></div>
    </div>

    <div class="hg-omer-grid">
      <div id="sukkotPhase" class="hg-omer-chip"><strong>Day / Phase:</strong> --</div>
      <div id="sukkotTheme" class="hg-omer-chip"><strong>Theme:</strong> --</div>
      <div id="sukkotDetail" class="hg-omer-chip"><strong>Details:</strong> Loading...</div>
    </div>
  </section>

  <section class="hg-omer-panel">
    <div class="hg-omer-kicker">Sukkot Meditation</div>

    <h3 id="sukkotMeditationTitle" class="hg-omer-meditation-title">Loading...</h3>
    <div id="sukkotMeditationText" class="hg-omer-note"></div>
    <div id="sukkotMeditationPrayer" class="hg-omer-note"></div>
    <div id="sukkotMeditationScripture" class="hg-omer-note"></div>
  </section>

</section>
