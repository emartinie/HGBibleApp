<section class="hg-omer-card">

  <div class="card-topbar">
    <button class="card-fullscreen-btn card-icon-btn primary" title="Expand Card">⛶</button>

    <button class="card-icon-btn nav" title="Home">⌂</button>
    <button class="card-icon-btn nav" title="Previous">←</button>
    <button class="card-icon-btn nav" title="Next">→</button>

    <button class="card-icon-btn audio" title="Audio Guide">🎧</button>
    <button class="card-icon-btn audio" title="Video Walkthrough">▶</button>

    <button class="card-icon-btn utility" title="Search Card">⌕</button>
    <button class="card-icon-btn utility" title="Bookmark">★</button>
    <button class="card-icon-btn utility" title="Share">⇪</button>
    <button class="card-icon-btn utility" title="Notes">✎</button>
    <button class="card-icon-btn utility" title="Help">?</button>
  </div>

  <!-- HEADER -->
  <section class="hg-omer-panel">

    <div id="sukkotDayNumber" class="hg-omer-big">--</div>

    <div id="sukkotTitle" class="hg-omer-title">Loading Sukkot...</div>

    <div id="sukkotHebrew" class="hg-omer-hebrew">טוען...</div>

    <p class="hg-omer-sub">Progress Bar</p>

    <div class="hg-progress-wrap">
      <div id="sukkotProgressBar" class="hg-progress-bar"></div>
    </div>

    <div class="hg-omer-grid">
      <div class="hg-omer-chip" id="sukkotPhase">
        <strong>Day / Phase:</strong> --
      </div>

      <div class="hg-omer-chip" id="sukkotTheme">
        <strong>Theme:</strong> --
      </div>

      <div class="hg-omer-chip" id="sukkotDetail">
        <strong>Details:</strong> Loading...
      </div>
    </div>

  </section>

  <!-- MEDITATION -->
  <section class="hg-omer-panel">

    <div class="hg-omer-kicker">Sukkot Meditation</div>

    <h3 class="hg-omer-meditation-title" id="sukkotMeditationTitle">
      Loading meditation...
    </h3>

    <div class="hg-omer-note" id="sukkotMeditationText"></div>
    <div class="hg-omer-note" id="sukkotMeditationPrayer"></div>
    <div class="hg-omer-note" id="sukkotMeditationScripture"></div>

  </section>

</section>
